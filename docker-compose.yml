services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sisreq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sisreq}
      POSTGRES_DB: ${POSTGRES_DB:-sisreq}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PUBLISH_PORT_AMQP:-5672}:5672"
      - "${RABBITMQ_PUBLISH_PORT_MGMT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 20s
      retries: 15
      start_period: 30s

  api:
    build: .
    env_file:
      - .env
    command: >
      sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "${API_PUBLISH_PORT:-8080}:${API_PORT:-8080}"
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sisreq}:${POSTGRES_PASSWORD:-sisreq}@postgres:5432/${POSTGRES_DB:-sisreq}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      SEPARATE_WS_SERVICE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const p=process.env.API_PORT||''8080'';fetch(''http://127.0.0.1:''+p+''/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s

  ws:
    build: .
    env_file:
      - .env
    command: ["npm", "run", "start:ws-service"]
    ports:
      - "${WS_PUBLISH_PORT:-8081}:${WS_PORT:-8081}"
    environment:
      NODE_ENV: production
      WS_PORT: ${WS_PORT:-8081}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sisreq}:${POSTGRES_PASSWORD:-sisreq}@postgres:5432/${POSTGRES_DB:-sisreq}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
