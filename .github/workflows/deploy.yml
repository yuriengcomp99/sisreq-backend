# Deploy: build → ECR → EC2 (docker compose).
# Nada sensível neste arquivo. Configure tudo em GitHub:
#   Settings → Secrets and variables → Actions
#     - Variables (não secretas)
#     - Secrets (sensíveis)
#
# Modelo de valores: veja .github/env.github.deploy.example
#
# A EC2 precisa de IAM com permissão de pull no ECR. Evolução: OIDC em vez de access keys.

name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build e push ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG_API: ${{ vars.IMAGE_TAG_API }}
      IMAGE_TAG_WS: ${{ vars.IMAGE_TAG_WS }}

    steps:
      - name: Validar variables obrigatórias
        run: |
          set -eux
          : "${AWS_REGION:?Configure a repository variable AWS_REGION}"
          : "${ECR_REPOSITORY:?Configure a repository variable ECR_REPOSITORY}"
          : "${IMAGE_TAG_API:?Configure a repository variable IMAGE_TAG_API}"
          : "${IMAGE_TAG_WS:?Configure a repository variable IMAGE_TAG_WS}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG_API: ${{ vars.IMAGE_TAG_API }}
          IMAGE_TAG_WS: ${{ vars.IMAGE_TAG_WS }}

      - name: Validar secrets obrigatórios (presença)
        run: |
          set -eux
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || (echo "Secret AWS_ACCESS_KEY_ID ausente" && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "Secret AWS_SECRET_ACCESS_KEY ausente" && exit 1)
        shell: bash

      - name: Checkout
        uses: actions/checkout@v5

      - name: Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push (duas tags)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -eux
          # GitHub Variables coladas no Windows podem trazer \r / \n no meio ou no fim
          sanitize() { printf '%s' "$1" | sed -e 's/\r//g' -e 's/\n//g' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          REGISTRY="$(sanitize "$REGISTRY")"
          ECR_REPOSITORY="$(sanitize "$ECR_REPOSITORY")"
          IMAGE_TAG_API="$(sanitize "$IMAGE_TAG_API")"
          IMAGE_TAG_WS="$(sanitize "$IMAGE_TAG_WS")"
          export REGISTRY ECR_REPOSITORY IMAGE_TAG_API IMAGE_TAG_WS
          docker build -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_API}" .
          # Uma linha só: evita problema se o YAML do workflow estiver em CRLF (\ no fim da linha)
          docker tag "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_API}" "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_WS}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_API}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_WS}"

  deploy:
    name: Deploy na EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      EC2_PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR }}

    steps:
      - name: Validar variables de deploy
        run: |
          set -eux
          : "${AWS_REGION:?Configure a repository variable AWS_REGION}"
          : "${ECR_REGISTRY:?Configure a repository variable ECR_REGISTRY (host do ECR, sem https)}"
          : "${EC2_PROJECT_DIR:?Configure a repository variable EC2_PROJECT_DIR (caminho absoluto no servidor)}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
          EC2_PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR }}

      - name: Validar secrets SSH
        run: |
          set -eux
          test -n "${{ secrets.EC2_HOST }}" || (echo "Secret EC2_HOST ausente" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Secret EC2_USER ausente" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Secret EC2_SSH_KEY ausente" && exit 1)
        shell: bash

      - name: SSH — pull e recriar api + ws
        uses: appleboy/ssh-action@v1.2.0
        env:
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_PROJECT_DIR: ${{ vars.EC2_PROJECT_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,AWS_REGION,EC2_PROJECT_DIR
          script_stop: true
          script: |
            set -eux
            sanitize() { printf '%s' "$1" | sed -e 's/\r//g' -e 's/\n//g' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
            AWS_REGION="$(sanitize "$AWS_REGION")"
            ECR_REGISTRY="$(sanitize "$ECR_REGISTRY")"
            EC2_PROJECT_DIR="$(sanitize "$EC2_PROJECT_DIR")"
            cd "$EC2_PROJECT_DIR"
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            # Disco pequeno na EC2: pull extrai camadas novas antes de soltar as antigas — libera imagens sem uso
            docker image prune -af || true
            docker builder prune -af 2>/dev/null || true
            docker compose pull api ws
            docker compose up -d --force-recreate api ws
            docker compose ps
